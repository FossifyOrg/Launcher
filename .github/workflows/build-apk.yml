name: Build APK

# Self-contained build/verification for the LAUNCHPAD fork. Unlike testing-build.yml (which
# defers to FossifyOrg's reusable workflow on labeled PRs only), this runs on every push to
# main and on demand, so the Kotlin compile + Room KSP @Query validation + ported unit tests
# are checked continuously, and a debug APK is produced as a downloadable artifact.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Assemble foss/debug + unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build debug APK (foss flavor)
        run: ./gradlew assembleFossDebug --stacktrace

      - name: Upload debug APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: launchpad-foss-debug
          path: app/build/outputs/apk/foss/debug/*.apk
          if-no-files-found: error

      - name: Run unit tests
        run: ./gradlew testFossDebugUnitTest --stacktrace

      - name: Upload unit test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-report
          path: app/build/reports/tests/testFossDebugUnitTest
          if-no-files-found: ignore

