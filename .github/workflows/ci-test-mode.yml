name: CI - Test Mode Build

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'companion/**'
  pull_request:
    branches: [main]
    paths:
      - 'app/**'
      - 'companion/**'
  workflow_dispatch:

jobs:
  build-main-app:
    name: 📱 Build Main App
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build Main App Debug APK
        run: ./gradlew app:assembleFossDebug

      - name: Upload Main App Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/foss/debug/*.apk
          retention-days: 7
          if-no-files-found: error

  build-companion-app:
    name: 📱 Build Companion App
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build Companion App Debug APK
        run: ./gradlew -p companion :app:assembleDebug

      - name: Upload Companion App Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: companion-debug
          path: companion/app/build/outputs/apk/debug/*.apk
          retention-days: 7
          if-no-files-found: error

  build-status:
    name: 📊 Build Status
    runs-on: ubuntu-latest
    needs: [build-main-app, build-companion-app]
    if: always()
    permissions:
      pull-requests: write
      issues: write

    steps:
      - name: Check build results
        run: |
          echo "## Build Status"
          if [ "${{ needs.build-main-app.result }}" = "success" ]; then
            echo "✅ Main App: SUCCESS"
          else
            echo "❌ Main App: FAILED"
          fi

          if [ "${{ needs.build-companion-app.result }}" = "success" ]; then
            echo "✅ Companion App: SUCCESS"
          else
            echo "❌ Companion App: FAILED"
          fi

      - name: Comment PR on success
        if: github.event_name == 'pull_request' && needs.build-main-app.result == 'success' && needs.build-companion-app.result == 'success'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '## ✅ All Builds Successful!\n\n**Artifacts ready for download:**\n- app-debug.apk\n- companion-debug.apk\n\nBoth apps compiled successfully with test mode support.'
            });

      - name: Comment PR on failure
        if: github.event_name == 'pull_request' && (needs.build-main-app.result == 'failure' || needs.build-companion-app.result == 'failure')
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '## ⚠️ Build Failed\n\nOne or more apps failed to build. Check the Actions tab for details.'
            });
