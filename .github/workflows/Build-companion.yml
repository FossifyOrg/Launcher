name: Build Companion APK

# Builds the LAUNCHPAD Eltern companion app (parent's phone APK).
# The companion lives in companion/ as a standalone Gradle project — it cannot
# be a submodule because Kotlin 2.x + AGP 9.x refuse to register the kotlin
# extension in two modules of the same build.
# This workflow uses the launcher's Gradle wrapper but points at companion/:
#   ./gradlew -p companion :app:assembleDebug

on:
  push:
    branches: [main]
    paths:
      - 'companion/**'
  pull_request:
    branches: [main]
    paths:
      - 'companion/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-companion:
    name: Assemble companion/debug
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build companion debug APK
        run: ./gradlew -p companion :app:assembleDebug --stacktrace

      - name: Upload companion APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: launchpad-eltern-companion
          path: companion/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
